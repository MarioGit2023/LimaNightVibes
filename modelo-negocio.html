<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modelo de Negocio - Lima Night Vibes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Playfair+Display:wght@700&display=swap');
    
    body { font-family: 'Inter', sans-serif; }
    .title-font { font-family: 'Playfair Display', sans-serif; }

    .section-title {
      position: relative;
      display: inline-block;
    }
    .section-title:after {
      content: '';
      position: absolute;
      width: 60px;
      height: 4px;
      background: linear-gradient(to right, #c026d3, #a855f7);
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 2px;
    }

  </style>
</head>

<!-- Modal para ver imágenes -->
<div id="imageModal"
     class="fixed inset-0 bg-black/90 hidden justify-center items-center z-50">

    <!-- Botón cerrar -->
    <button onclick="closeImage()"
        class="absolute top-6 right-8 text-white text-5xl hover:text-red-500 transition">
        &times;
    </button>

    <!-- Imagen -->
    <img id="modalImage"
         class="max-w-[95%] max-h-[90%] rounded-xl shadow-2xl">
</div>

<body class="bg-zinc-950 text-white">

  <nav class="fixed top-0 w-full bg-black/95 backdrop-blur-md z-50 border-b border-purple-500">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-3xl">🌃</div>
        <h1 class="text-2xl font-bold tracking-tighter">Lima Night Vibes</h1>
      </a>
      <a href="index.html" class="flex items-center gap-2 text-purple-400 hover:text-purple-300 transition">
        <i class="fas fa-arrow-left"></i> Volver al Inicio
      </a>
    </div>
  </nav>

  <div class="pt-28 pb-20">
    <div class="max-w-7xl mx-auto px-6">
      
      <h2 class="text-6xl font-bold text-center mb-20 title-font">MODELO DE NEGOCIO</h2>

      <div class="flex justify-center mb-20">
        <img src="Imagenes/ModeloNegocio.png" 
             alt="Modelo de Negocio" 
             
             class="rounded-3xl shadow-2xl max-w-6xl w-full border border-purple-500/20">
      </div>


      <div class="mb-24">
        <h3 class="section-title text-4xl font-bold text-center mb-12">
          Resultados de la Encuesta del Proyecto de Inversión
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

          <a>
              <img src="Imagenes/2.jpeg"
                  onclick="openImage(this.src)"
                  class="w-full h-90 object-cover rounded-3xl shadow-2xl border border-purple-500/20 hover:scale-105 transition duration-300 cursor-pointer"
                  alt="Encuesta 1">
          </a>

          <a>
            <img src="Imagenes/PM.jpeg"
              onclick="openImage(this.src)"
              class="w-full h-90 object-cover rounded-3xl shadow-2xl border border-purple-500/20 hover:scale-105 transition duration-300 cursor-pointer"
              alt="Encuesta 2">
          </a>

          <a>
            <img src="Imagenes/3.jpeg"
              onclick="openImage(this.src)"
              class="w-full h-90 object-cover rounded-3xl shadow-2xl border border-purple-500/20 hover:scale-105 transition duration-300 cursor-pointer"
              alt="Encuesta 3">
          </a>

          <a>
            <img src="Imagenes/4.jpeg"
              onclick="openImage(this.src)"
              class="w-full  h-90 object-cover rounded-3xl shadow-2xl border border-purple-500/20 hover:scale-105 transition duration-300 cursor-pointer"
              alt="Encuesta 2">
          </a>

        </div>
      </div>

      <div class="mb-24">
        <h3 class="section-title text-4xl font-bold text-center mb-12">
          Árbol de Medios y Fines
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
           <a>
            <img src="Imagenes/5.jpeg"
              onclick="openImage(this.src)"
              class="w-full h-90 object-cover rounded-3xl shadow-2xl border border-purple-500/20 hover:scale-105 transition duration-300 cursor-pointer"
              alt="Árbol 1">
          </a>
          
           <a>
            <img src="Imagenes/6.jpeg"
              onclick="openImage(this.src)"
              class="w-full h-90 object-cover rounded-3xl shadow-2xl border border-purple-500/20 hover:scale-105 transition duration-300 cursor-pointer"
              alt="Árbol 2">
          </a>

        </div>
      </div>

      <div class="mb-24">
        <h3 class="section-title text-4xl font-bold text-center mb-12">
          Análisis FODA
        </h3>

        <div class="flex justify-center mb-20">
          <img src="Imagenes/Foda.png" 
              alt="Modelo de Negocio" 
              class="rounded-3xl shadow-2xl max-w-6xl w-full border border-purple-500/20">
        </div>
      </div>

      <br>
      <div class="mb-24">
        <h3 class="section-title text-4xl font-bold text-center mb-12">
          KIPs
        </h3>

        <div class="flex justify-center mb-20">
          <img src="Imagenes/Kpis.jpeg" 
              alt="Modelo de Negocio" 
              class="rounded-3xl shadow-2xl max-w-6xl w-full border border-purple-500/20">
        </div>
      </div>

    </div>
  </div>
  <script>

    function openImage(src){
        document.getElementById("modalImage").src = src;
        document.getElementById("imageModal").classList.remove("hidden");
        document.getElementById("imageModal").classList.add("flex");
    }

    function closeImage(){
        document.getElementById("imageModal").classList.add("hidden");
        document.getElementById("imageModal").classList.remove("flex");
    }

    // Cerrar haciendo clic fuera de la imagen
    document.getElementById("imageModal").addEventListener("click", function(e){
        if(e.target.id === "imageModal"){
            closeImage();
        }
    });

  </script>
  
</body>
</html>
